name: Build FFmpeg Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ffmpeg/small/build-instructions.md
      - .github/workflows/build-ffmpeg.yml

permissions:
  contents: read

jobs:
  build-ffmpeg:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            output: proteus-author-ffmpeg-aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
            output: proteus-author-ffmpeg-x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            output: proteus-author-ffmpeg-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            output: proteus-author-ffmpeg-aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: proteus-author-ffmpeg-x86_64-pc-windows-msvc.exe
            msystem: MINGW64
            cc: gcc
            host_cc: gcc
            configure_extra: ""
            win_packages: >-
              git
              make
              diffutils
              pkgconf
              yasm
              nasm
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-libvorbis
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            output: proteus-author-ffmpeg-aarch64-pc-windows-msvc.exe
            msystem: CLANGARM64
            cc: clang
            host_cc: clang
            configure_extra: "--target-os=mingw32 --arch=aarch64"
            win_packages: >-
              git
              make
              diffutils
              pkgconf
              yasm
              nasm
              mingw-w64-clang-aarch64-toolchain
              mingw-w64-clang-aarch64-libvorbis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows only)
        if: startsWith(matrix.os, 'windows-')
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.win_packages }}

      - name: Install dependencies (Linux only)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            yasm \
            nasm \
            libvorbis-dev

      - name: Install dependencies (macOS only)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew install pkg-config yasm nasm libvorbis

      - name: Build FFmpeg (macOS/Linux)
        if: ${{ !startsWith(matrix.os, 'windows-') }}
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          make distclean 2>/dev/null || true

          ./configure \
            --prefix="$PWD/build" \
            --disable-everything \
            --enable-ffmpeg \
            --enable-protocol=file \
            --enable-muxer=matroska \
            --enable-encoder=libvorbis \
            --enable-libvorbis \
            --enable-demuxer=wav \
            --enable-decoder=pcm_s16le \
            --enable-decoder=pcm_s24le \
            --enable-decoder=pcm_s32le \
            --enable-decoder=pcm_f32le \
            --enable-demuxer=mp3 \
            --enable-decoder=mp3 \
            --enable-parser=mp3 \
            --enable-swresample \
            --enable-avfilter \
            --enable-filter=aresample \
            --enable-filter=aformat \
            --enable-filter=anull \
            --disable-doc \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-avdevice \
            --disable-swscale \
            --disable-network

          make -j"$(getconf _NPROCESSORS_ONLN || sysctl -n hw.ncpu)"
          make install
          strip build/bin/ffmpeg || true
          cp build/bin/ffmpeg "../${{ matrix.output }}"

      - name: Build FFmpeg (Windows)
        if: startsWith(matrix.os, 'windows-')
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          make distclean 2>/dev/null || true

          ./configure \
            --prefix="$PWD/build" \
            --cc="${{ matrix.cc }}" \
            --host-cc="${{ matrix.host_cc }}" \
            --disable-everything \
            --enable-ffmpeg \
            --enable-protocol=file \
            --enable-muxer=matroska \
            --enable-encoder=libvorbis \
            --enable-libvorbis \
            --enable-demuxer=wav \
            --enable-decoder=pcm_s16le \
            --enable-decoder=pcm_s24le \
            --enable-decoder=pcm_s32le \
            --enable-decoder=pcm_f32le \
            --enable-demuxer=mp3 \
            --enable-decoder=mp3 \
            --enable-parser=mp3 \
            --enable-swresample \
            --enable-avfilter \
            --enable-filter=aresample \
            --enable-filter=aformat \
            --enable-filter=anull \
            --disable-doc \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-avdevice \
            --disable-swscale \
            --disable-network \
            ${{ matrix.configure_extra }}

          make -j"$(nproc)"
          make install
          strip build/bin/ffmpeg.exe || true
          cp build/bin/ffmpeg.exe "../${{ matrix.output }}"

      - name: Upload FFmpeg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          if-no-files-found: error
